<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<meta name="apple-mobile-web-app-title" content="Bill Splitter" />
<meta name="theme-color" content="#ffffff" />
<title>Bill Splitter</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.31.0/dist/tabler-icons.min.css" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #ffffff;
    --bg2: #f5f5f3;
    --bg3: #eeede9;
    --text: #1a1a18;
    --text2: #6b6b67;
    --border: rgba(0,0,0,0.12);
    --border2: rgba(0,0,0,0.22);
    --accent: #4f46e5;
    --accent-bg: #eef2ff;
    --accent-text: #3730a3;
    --success-bg: #f0fdf4;
    --success-text: #166534;
    --warn-bg: #fffbeb;
    --warn-text: #92400e;
    --radius: 10px;
    --radius-lg: 14px;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1c1c1a;
      --bg2: #272724;
      --bg3: #323230;
      --text: #f0efe9;
      --text2: #9a9a95;
      --border: rgba(255,255,255,0.1);
      --border2: rgba(255,255,255,0.2);
      --accent: #818cf8;
      --accent-bg: #1e1b4b;
      --accent-text: #c7d2fe;
      --success-bg: #052e16;
      --success-text: #86efac;
      --warn-bg: #1c0a00;
      --warn-text: #fcd34d;
    }
  }

  html { font-size: 16px; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg2);
    color: var(--text);
    line-height: 1.5;
    min-height: 100dvh;
  }

  header {
    background: var(--bg);
    border-bottom: 0.5px solid var(--border);
    padding: 16px 20px;
    position: sticky;
    top: 0;
    z-index: 10;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  header h1 { font-size: 18px; font-weight: 600; }
  header .sub { font-size: 13px; color: var(--text2); margin-left: auto; }

  main { max-width: 680px; margin: 0 auto; padding: 16px; display: flex; flex-direction: column; gap: 12px; padding-bottom: 40px; }

  .card {
    background: var(--bg);
    border: 0.5px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 16px;
  }
  .card-title {
    font-size: 14px;
    font-weight: 600;
    color: var(--text2);
    text-transform: uppercase;
    letter-spacing: 0.04em;
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .card-title i { font-size: 16px; }

  input[type="text"], input[type="number"], select {
    background: var(--bg2);
    border: 0.5px solid var(--border2);
    border-radius: var(--radius);
    padding: 9px 12px;
    font-size: 15px;
    color: var(--text);
    width: 100%;
    outline: none;
    -webkit-appearance: none;
  }
  input:focus, select:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(79,70,229,0.15); }

  .row { display: flex; gap: 8px; align-items: center; margin-bottom: 8px; }
  .row input { flex: 1; }

  button {
    background: var(--bg);
    border: 0.5px solid var(--border2);
    border-radius: var(--radius);
    padding: 9px 16px;
    font-size: 14px;
    font-weight: 500;
    color: var(--text);
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    white-space: nowrap;
    -webkit-tap-highlight-color: transparent;
  }
  button:active { opacity: 0.7; transform: scale(0.97); }
  button.primary {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
    justify-content: center;
    width: 100%;
    font-size: 15px;
    padding: 12px;
    border-radius: var(--radius-lg);
  }
  button.add-btn { width: 100%; justify-content: center; margin-top: 4px; }
  button.icon-btn { padding: 8px 10px; }

  .tag {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: var(--bg2);
    border: 0.5px solid var(--border);
    border-radius: 999px;
    padding: 4px 10px 4px 8px;
    font-size: 13px;
  }
  .tag button { background: none; border: none; padding: 0; color: var(--text2); font-size: 14px; }
  .tags { display: flex; flex-wrap: wrap; gap: 6px; min-height: 10px; }

  .item-block {
    border: 0.5px solid var(--border);
    border-radius: var(--radius);
    padding: 12px;
    margin-bottom: 10px;
    background: var(--bg2);
  }
  .item-top {
    display: grid;
    grid-template-columns: 1fr 90px;
    gap: 8px;
    margin-bottom: 8px;
  }
  .item-controls {
    display: flex;
    gap: 8px;
    align-items: center;
    flex-wrap: wrap;
    margin-bottom: 6px;
  }
  .item-controls select { width: auto; flex: 1; min-width: 130px; font-size: 13px; padding: 6px 10px; }
  .badge {
    font-size: 11px;
    font-weight: 600;
    padding: 3px 9px;
    border-radius: 999px;
    white-space: nowrap;
  }
  .badge-tax { background: var(--warn-bg); color: var(--warn-text); }
  .badge-notax { background: var(--success-bg); color: var(--success-text); }

  .tax-toggle {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    cursor: pointer;
    font-size: 13px;
    padding: 5px 10px;
    border-radius: var(--radius);
    border: 0.5px solid var(--border);
    background: var(--bg);
  }
  .tax-toggle input { margin: 0; accent-color: var(--accent); width: 15px; height: 15px; }

  .cb-wrap { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
  .cb-label {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    font-size: 13px;
    cursor: pointer;
    background: var(--bg);
    padding: 5px 10px;
    border-radius: var(--radius);
    border: 0.5px solid var(--border);
  }
  .cb-label input { accent-color: var(--accent); margin: 0; }

  .qty-split-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
    gap: 6px;
    width: 100%;
  }
  .qty-person-row {
    display: flex;
    align-items: center;
    gap: 6px;
    background: var(--bg);
    border: 0.5px solid var(--border);
    border-radius: var(--radius);
    padding: 5px 8px;
  }
  .qty-person-name {
    flex: 1;
    font-size: 13px;
    display: flex;
    align-items: center;
    gap: 4px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    min-width: 0;
  }
  .qty-input {
    width: 52px !important;
    flex-shrink: 0;
    padding: 4px 6px !important;
    font-size: 13px !important;
    text-align: center;
  }
  .qty-total-hint {
    font-size: 11px;
    color: var(--text2);
    margin-top: 6px;
    width: 100%;
  }
  .qty-total-hint.warn { color: var(--warn-text); }

  .extras-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .field label { font-size: 13px; color: var(--text2); display: block; margin-bottom: 5px; }

  .summary-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 14px; }
  .metric { background: var(--bg2); border-radius: var(--radius); padding: 12px; }
  .metric-label { font-size: 11px; color: var(--text2); text-transform: uppercase; letter-spacing: 0.04em; margin-bottom: 3px; }
  .metric-value { font-size: 18px; font-weight: 600; }

  .divider { border: none; border-top: 0.5px solid var(--border); margin: 12px 0; }

  .result-card {
    background: var(--bg2);
    border-radius: var(--radius);
    padding: 12px 14px;
    margin-bottom: 8px;
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 10px;
  }
  .result-name { font-weight: 600; font-size: 15px; display: flex; align-items: center; gap: 6px; }
  .result-items { font-size: 12px; color: var(--text2); margin-top: 3px; line-height: 1.4; }
  .result-amount { font-size: 22px; font-weight: 700; color: var(--accent); white-space: nowrap; }

  .empty-hint { font-size: 13px; color: var(--text2); margin-bottom: 10px; }

  #install-banner {
    background: var(--accent-bg);
    border: 0.5px solid var(--accent);
    border-radius: var(--radius-lg);
    padding: 12px 16px;
    font-size: 13px;
    color: var(--accent-text);
    display: flex;
    align-items: center;
    gap: 10px;
  }
  #install-banner i { font-size: 20px; flex-shrink: 0; }
  #install-banner .dismiss { background: none; border: none; color: var(--accent-text); padding: 4px 6px; margin-left: 0; }

  @media (max-width: 480px) {
    .summary-grid { grid-template-columns: repeat(3,1fr); }
    .item-top { grid-template-columns: 1fr 80px; }
    .result-amount { font-size: 18px; }
  }

  /* Scan receipt */
  .scan-btn {
    width: 100%;
    justify-content: center;
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
    font-size: 15px;
    padding: 12px;
    border-radius: var(--radius-lg);
    margin-bottom: 0;
  }
  .scan-btn:active { opacity: 0.8; }

  #scan-modal {
    display: none;
    position: fixed;
    inset: 0;
    z-index: 100;
    background: rgba(0,0,0,0.55);
    align-items: flex-end;
    justify-content: center;
  }
  #scan-modal.open { display: flex; }
  .scan-sheet {
    background: var(--bg);
    border-radius: var(--radius-lg) var(--radius-lg) 0 0;
    padding: 20px 20px 36px;
    width: 100%;
    max-width: 680px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .scan-sheet h2 { font-size: 16px; font-weight: 600; display: flex; align-items: center; gap: 8px; }
  .scan-preview {
    width: 100%;
    max-height: 220px;
    object-fit: contain;
    border-radius: var(--radius);
    border: 0.5px solid var(--border);
    display: none;
  }
  .scan-drop {
    border: 1.5px dashed var(--border2);
    border-radius: var(--radius);
    padding: 28px 16px;
    text-align: center;
    font-size: 14px;
    color: var(--text2);
    cursor: pointer;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
  }
  .scan-drop i { font-size: 32px; color: var(--accent); }
  .scan-status {
    font-size: 13px;
    color: var(--text2);
    text-align: center;
    min-height: 20px;
  }
  .scan-status.error { color: #e24b4a; }
  .scan-status.success { color: var(--success-text); }
  .scan-actions { display: flex; gap: 8px; }
  .scan-actions button { flex: 1; justify-content: center; }
  .scan-actions button.primary { flex: 2; }
</style>
</head>
<body>

<header>
  <i class="ti ti-receipt-2" style="font-size:22px;color:var(--accent);"></i>
  <h1>Bill Splitter</h1>
  <span class="sub" id="item-count"></span>
  <button onclick="openSettings()" style="margin-left:auto;background:none;border:none;padding:6px;color:var(--text2);" title="API Key settings"><i class="ti ti-settings" style="font-size:20px;"></i></button>
</header>

<main>

  <div id="install-banner" style="display:none;">
    <i class="ti ti-device-mobile"></i>
    <span>Install this app: tap <strong>Share</strong> then <strong>Add to Home Screen</strong> in Safari.</span>
    <button class="dismiss" onclick="document.getElementById('install-banner').style.display='none'" aria-label="Dismiss"><i class="ti ti-x"></i></button>
  </div>

  <div class="card">
    <p class="card-title"><i class="ti ti-users"></i> People</p>
    <div class="row">
      <input type="text" id="person-input" placeholder="Enter name…" autocomplete="off" />
      <button onclick="addPerson()"><i class="ti ti-plus"></i> Add</button>
    </div>
    <div class="tags" id="people-tags"></div>
  </div>

  <div class="card">
    <p class="card-title"><i class="ti ti-receipt"></i> Items</p>
    <div id="items-list"><p class="empty-hint">No items yet. Add one below.</p></div>
    <div style="display:flex;gap:8px;margin-top:4px;">
      <button class="add-btn" style="flex:1;" onclick="addItem()"><i class="ti ti-plus"></i> Add item</button>
      <button class="add-btn" style="flex:1;background:var(--accent);border-color:var(--accent);color:#fff;" onclick="openScanModal()"><i class="ti ti-camera"></i> Scan receipt</button>
    </div>
  </div>

  <!-- Scan Receipt Modal -->
  <div id="scan-modal" onclick="handleModalBackdrop(event)">
    <div class="scan-sheet">
      <h2><i class="ti ti-camera" style="color:var(--accent);"></i> Scan Receipt</h2>
      <div class="scan-drop" id="scan-drop" onclick="document.getElementById('scan-file-input').click()">
        <i class="ti ti-photo-scan"></i>
        <span>Tap to take a photo or upload receipt</span>
        <span style="font-size:12px;">JPG, PNG supported</span>
      </div>
      <img id="scan-preview" class="scan-preview" alt="Receipt preview" />
      <input type="file" id="scan-file-input" accept="image/*" capture="environment" style="display:none;" onchange="handleScanFile(this)" />
      <p class="scan-status" id="scan-status"></p>
      <div class="scan-actions">
        <button onclick="closeScanModal()"><i class="ti ti-x"></i> Cancel</button>
        <button class="primary" id="scan-confirm-btn" onclick="confirmScan()" style="display:none;"><i class="ti ti-check"></i> Add these items</button>
      </div>
    </div>
  </div>

  <div class="card">
    <p class="card-title"><i class="ti ti-adjustments"></i> Extras <span style="font-size:11px;font-weight:400;color:var(--text2);text-transform:none;letter-spacing:0;">(taxable items only)</span></p>
    <div class="extras-grid" style="margin-bottom:12px;">
      <div class="field">
        <label>Service charge (%)</label>
        <input type="number" id="service-charge" value="0" min="0" max="100" step="0.5" oninput="calculate()" />
      </div>
      <div class="field">
        <label>GST / Tax (%)</label>
        <input type="number" id="gst" value="9" min="0" max="100" step="0.5" oninput="calculate()" />
      </div>
    </div>
  </div>

  <button class="primary" onclick="calculate()"><i class="ti ti-calculator"></i> Calculate split</button>

  <div class="card" id="results-section" style="display:none;">
    <p class="card-title"><i class="ti ti-chart-pie"></i> Split summary</p>
    <div class="summary-grid" id="summary-grid"></div>
    <hr class="divider" />
    <div id="results-list"></div>
    <button onclick="shareResults()" style="width:100%;justify-content:center;margin-top:4px;"><i class="ti ti-share"></i> Share results</button>
  </div>

  <button onclick="resetAll()" style="width:100%;justify-content:center;color:var(--text2);"><i class="ti ti-refresh"></i> Reset everything</button>

</main>

<script>
let people = [];
let items = [];
let itemId = 0;

function saveDraft() {
  try { localStorage.setItem('bs_draft', JSON.stringify({people, items, itemId})); } catch(e){}
}
function loadDraft() {
  try {
    const d = JSON.parse(localStorage.getItem('bs_draft')||'null');
    if (d) {
      people = d.people||[];
      items = (d.items||[]).map(item => ({ personQty: {}, ...item }));
      itemId = d.itemId||0;
    }
  } catch(e){}
}

function addPerson() {
  const input = document.getElementById('person-input');
  const name = input.value.trim();
  if (!name || people.includes(name)) { input.focus(); return; }
  people.push(name);
  input.value = '';
  items.forEach(item => {
    if (item.splitMode === 'all') item.persons = [...people];
    if (item.splitMode === 'qty' && item.personQty[name] === undefined) item.personQty[name] = 0;
  });
  renderPeople(); renderItems(); saveDraft();
}

function removePerson(name) {
  people = people.filter(p => p !== name);
  items.forEach(item => {
    item.persons = item.persons.filter(p => p !== name);
    if (item.splitMode === 'all') item.persons = [...people];
    delete item.personQty[name];
  });
  renderPeople(); renderItems(); calculate(); saveDraft();
}

function renderPeople() {
  document.getElementById('people-tags').innerHTML = people.length
    ? people.map(p => `<span class="tag"><i class="ti ti-user" style="font-size:13px;"></i>${p}<button onclick="removePerson('${p}')" aria-label="Remove ${p}"><i class="ti ti-x"></i></button></span>`).join('')
    : '<span style="font-size:13px;color:var(--text2);">No people added yet.</span>';
}

function addItem() {
  const id = ++itemId;
  const personQty = {};
  people.forEach(p => { personQty[p] = 0; });
  items.push({ id, name: '', price: '', personQty, persons: [...people], taxable: true, splitMode: 'all' });
  renderItems(); saveDraft();
}

function removeItem(id) {
  items = items.filter(i => i.id !== id);
  renderItems(); calculate(); saveDraft();
}

function renderItems() {
  const el = document.getElementById('items-list');
  if (!items.length) { el.innerHTML = '<p class="empty-hint">No items yet. Add one below.</p>'; updateCount(); return; }
  el.innerHTML = items.map(item => {
    const totalAssigned = people.reduce((s, p) => s + (parseFloat(item.personQty[p]) || 0), 0);
    const qtyHint = item.splitMode === 'qty'
      ? `<div class="qty-total-hint${totalAssigned === 0 ? ' warn' : ''}">Total units assigned: ${totalAssigned}${totalAssigned === 0 ? ' — enter at least one quantity above' : ''}</div>`
      : '';
    const personsArea = item.splitMode === 'qty'
      ? (people.length === 0
          ? '<span style="font-size:12px;color:var(--text2);">Add people first</span>'
          : `<div class="qty-split-grid">${people.map(p => `
              <div class="qty-person-row">
                <span class="qty-person-name"><i class="ti ti-user" style="font-size:11px;color:var(--text2);"></i>${p}</span>
                <input type="number" class="qty-input" placeholder="0" value="${item.personQty[p] || ''}" min="0" step="1" oninput="updatePersonQty(${item.id},'${p}',this.value)" />
              </div>`).join('')}</div>${qtyHint}`)
      : `${people.map(p => `
          <label class="cb-label">
            <input type="checkbox" ${item.persons.includes(p) ? 'checked' : ''} onchange="togglePerson(${item.id},'${p}',this.checked)" />${p}
          </label>`).join('')}
        ${people.length === 0 ? '<span style="font-size:12px;color:var(--text2);">Add people first</span>' : ''}`;
    return `
    <div class="item-block" id="block-${item.id}">
      <div class="item-top">
        <input type="text" placeholder="Item name…" value="${item.name}" oninput="updateItem(${item.id},'name',this.value)" />
        <input type="number" placeholder="0.00" value="${item.price}" min="0" step="0.01" oninput="updateItem(${item.id},'price',this.value)" />
      </div>
      <div class="item-controls">
        <select onchange="updateSplitMode(${item.id},this.value)">
          <option value="all" ${item.splitMode === 'all' ? 'selected' : ''}>Split equally</option>
          <option value="select" ${item.splitMode === 'select' ? 'selected' : ''}>Select people</option>
          <option value="qty" ${item.splitMode === 'qty' ? 'selected' : ''}>Split by quantity</option>
        </select>
        <label class="tax-toggle">
          <input type="checkbox" ${item.taxable ? 'checked' : ''} onchange="updateItem(${item.id},'taxable',this.checked)" />
          ${item.taxable
            ? '<span class="badge badge-tax"><i class="ti ti-percentage" style="font-size:11px;"></i> +GST/SC</span>'
            : '<span class="badge badge-notax"><i class="ti ti-ban" style="font-size:11px;"></i> No tax</span>'}
        </label>
        <button class="icon-btn" onclick="removeItem(${item.id})" aria-label="Remove item"><i class="ti ti-trash" style="color:#e24b4a;"></i></button>
      </div>
      <div class="cb-wrap" id="persons-${item.id}" style="${item.splitMode === 'all' ? 'display:none' : ''}">
        ${personsArea}
      </div>
    </div>`;
  }).join('');
  updateCount();
}

function updateCount() {
  const total = items.reduce((s,i)=>s+(parseFloat(i.price)||0),0);
  document.getElementById('item-count').textContent = items.length
    ? `${items.length} item${items.length>1?'s':''} · $${total.toFixed(2)}`
    : '';
}

function updateItem(id, field, val) {
  const item = items.find(i => i.id === id);
  if (!item) return;
  item[field] = val;
  if (field === 'taxable') renderItems();
  updateCount(); saveDraft();
}

function updateSplitMode(id, mode) {
  const item = items.find(i => i.id === id);
  if (!item) return;
  item.splitMode = mode;
  if (mode === 'all') {
    item.persons = [...people];
  } else if (mode === 'qty') {
    people.forEach(p => { if (item.personQty[p] === undefined) item.personQty[p] = 0; });
  }
  renderItems(); saveDraft();
}

function togglePerson(id, name, checked) {
  const item = items.find(i => i.id === id);
  if (!item) return;
  if (checked) { if (!item.persons.includes(name)) item.persons.push(name); }
  else { item.persons = item.persons.filter(p => p !== name); }
  saveDraft();
}

function updatePersonQty(id, person, val) {
  const item = items.find(i => i.id === id);
  if (!item) return;
  item.personQty[person] = parseFloat(val) || 0;
  updateCount(); saveDraft();
}

function calculate() {
  if (!people.length || !items.length) { document.getElementById('results-section').style.display='none'; return; }
  const sc = parseFloat(document.getElementById('service-charge').value)||0;
  const gst = parseFloat(document.getElementById('gst').value)||0;
  const multiplier = (1 + sc/100) * (1 + gst/100);

  let taxableSubtotal = 0, noTaxSubtotal = 0;
  items.forEach(item => {
    const p = parseFloat(item.price)||0;
    if (item.taxable) taxableSubtotal += p; else noTaxSubtotal += p;
  });

  const personTotals = {};
  const personItems = {};
  people.forEach(p => { personTotals[p] = 0; personItems[p] = []; });

  items.forEach(item => {
    const price = parseFloat(item.price)||0;

    if (item.splitMode === 'qty') {
      const totalQty = people.reduce((s, p) => s + (parseFloat(item.personQty[p]) || 0), 0);
      if (!totalQty) return;
      people.forEach(p => {
        const pQty = parseFloat(item.personQty[p]) || 0;
        if (!pQty) return;
        let share = price * (pQty / totalQty);
        if (item.taxable) share *= multiplier;
        personTotals[p] += share;
        personItems[p].push(`${item.name||'Item'} ×${pQty} ($${share.toFixed(2)}${item.taxable?'':' · no tax'})`);
      });
    } else {
      const split = item.persons.filter(p => people.includes(p));
      if (!split.length) return;
      let share;
      if (item.taxable) {
        share = price / split.length * multiplier;
      } else {
        share = price / split.length;
      }
      split.forEach(p => {
        personTotals[p] += share;
        personItems[p].push(`${item.name||'Item'} ($${share.toFixed(2)}${item.taxable?'':' · no tax'})`);
      });
    }
  });

  const taxableAfter = taxableSubtotal * multiplier;
  const grandTotal = taxableAfter + noTaxSubtotal;

  document.getElementById('summary-grid').innerHTML = `
    <div class="metric"><div class="metric-label">Taxable</div><div class="metric-value">$${taxableSubtotal.toFixed(2)}</div></div>
    <div class="metric"><div class="metric-label">Tax-free</div><div class="metric-value">$${noTaxSubtotal.toFixed(2)}</div></div>
    <div class="metric"><div class="metric-label">Total</div><div class="metric-value">$${grandTotal.toFixed(2)}</div></div>`;

  document.getElementById('results-list').innerHTML = people.map(p => `
    <div class="result-card">
      <div style="flex:1;min-width:0;">
        <div class="result-name"><i class="ti ti-user" style="font-size:15px;color:var(--accent);"></i>${p}</div>
        <div class="result-items">${personItems[p].join('<br>')||'No items assigned'}</div>
      </div>
      <div class="result-amount">$${personTotals[p].toFixed(2)}</div>
    </div>`).join('');

  document.getElementById('results-section').style.display='block';
}

function shareResults() {
  const sc = parseFloat(document.getElementById('service-charge').value)||0;
  const gst = parseFloat(document.getElementById('gst').value)||0;
  const multiplier = (1 + sc/100) * (1 + gst/100);
  let taxableSubtotal = 0, noTaxSubtotal = 0;
  items.forEach(item => {
    const p = parseFloat(item.price)||0;
    if (item.taxable) taxableSubtotal += p; else noTaxSubtotal += p;
  });
  const taxableAfter = taxableSubtotal * multiplier;
  const grandTotal = taxableAfter + noTaxSubtotal;

  const personTotals = {};
  const personItems = {};
  people.forEach(p => { personTotals[p] = 0; personItems[p] = []; });
  items.forEach(item => {
    const price = parseFloat(item.price)||0;
    if (item.splitMode === 'qty') {
      const totalQty = people.reduce((s, p) => s + (parseFloat(item.personQty[p]) || 0), 0);
      if (!totalQty) return;
      people.forEach(p => {
        const pQty = parseFloat(item.personQty[p]) || 0;
        if (!pQty) return;
        let share = price * (pQty / totalQty);
        if (item.taxable) share *= multiplier;
        personTotals[p] += share;
        personItems[p].push(`  - ${item.name||'Item'} ×${pQty}: $${share.toFixed(2)}`);
      });
    } else {
      const split = item.persons.filter(p => people.includes(p));
      if (!split.length) return;
      let share;
      if (item.taxable) {
        share = price / split.length * multiplier;
      } else {
        share = price / split.length;
      }
      split.forEach(p => { personTotals[p] += share; personItems[p].push(`  - ${item.name||'Item'}: $${share.toFixed(2)}`); });
    }
  });

  let text = `Bill Split Summary\nTotal: $${grandTotal.toFixed(2)}\n\n`;
  people.forEach(p => { text += `${p}: $${personTotals[p].toFixed(2)}\n${personItems[p].join('\n')}\n\n`; });

  if (navigator.share) {
    navigator.share({ title: 'Bill Split', text: text.trim() }).catch(()=>{});
  } else {
    navigator.clipboard.writeText(text.trim()).then(() => alert('Results copied to clipboard!')).catch(()=> alert(text));
  }
}

  people = []; items = []; itemId = 0;

let scanImageBase64 = null;
let scannedItems = [];

function openScanModal() {

  }

function closeScanModal() {

function handleModalBackdrop(e) {

function getMediaType(file) {
  // Detect actual media type from file, fall back to image/jpeg
  const t = file.type;
  if (t === 'image/png') return 'image/png';
  if (t === 'image/gif') return 'image/gif';
  if (t === 'image/webp') return 'image/webp';
  return 'image/jpeg'; // covers JPEG, HEIC, and unknowns — canvas will convert
}

function handleScanFile(input) {
  const file = input.files[0];
  if (!file) return;

  const status = document.getElementById('scan-status');
  status.className = 'scan-status';
  status.textContent = '⏳ Loading image…';

  // Always convert to JPEG via canvas to handle HEIC and other formats
  const img = new Image();
  const objectUrl = URL.createObjectURL(file);
  img.onload = async () => {
    URL.revokeObjectURL(objectUrl);
    // Draw on canvas and export as JPEG (max 1600px wide to keep size reasonable)
    const canvas = document.createElement('canvas');
    const MAX = 1600;
    let w = img.naturalWidth, h = img.naturalHeight;
    if (w > MAX) { h = Math.round(h * MAX / w); w = MAX; }
    canvas.width = w; canvas.height = h;
    canvas.getContext('2d').drawImage(img, 0, 0, w, h);
    const dataUrl = canvas.toDataURL('image/jpeg', 0.92);
    scanImageBase64 = dataUrl.split(',')[1];

    const preview = document.getElementById('scan-preview');
    preview.src = dataUrl;
    preview.style.display = 'block';
    document.getElementById('scan-drop').style.display = 'none';
    await analyseReceipt();
  };
  img.onerror = () => {
    URL.revokeObjectURL(objectUrl);
    status.className = 'scan-status error';
    status.textContent = '❌ Could not load image. Please try a different photo.';
  };
  img.src = objectUrl;
}

async function analyseReceipt() {
  const status = document.getElementById('scan-status');
  const confirmBtn = document.getElementById('scan-confirm-btn');
  status.className = 'scan-status';
  status.textContent = '🔍 Reading receipt with AI…';
  confirmBtn.style.display = 'none';
  scannedItems = [];

  try {
    const apiKey = getApiKey();
    if (!apiKey) {
      status.className = 'scan-status error';
      status.textContent = '❌ No API key set. Tap ⚙️ in the header to add your free Gemini API key.';
      return;
    }

    const response = await fetch(
      `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${apiKey}`,
      {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          contents: [{
            parts: [
              {
                inline_data: {
                  mime_type: 'image/jpeg',
                  data: scanImageBase64
                }
              },
              {
                text: `You are a receipt parser. Extract every line item from this receipt image.
Return ONLY a JSON array, no explanation, no markdown, no extra text, no code fences.
Each object must have:
- "name": string (item name, keep it short)
- "price": number (final price for that line, as a positive number)
Ignore subtotals, totals, tax lines, service charge lines, discounts, and headers.
Only include individual food/drink/product items.
Example: [{"name":"Chicken Rice","price":4.50},{"name":"Teh Tarik","price":1.80}]`
              }
            ]
          }],
          generationConfig: { temperature: 0.1 }
        })
      }
    );

    if (!response.ok) {
      const errBody = await response.json().catch(() => ({}));
      const msg = errBody?.error?.message || `HTTP ${response.status}`;
      throw new Error(msg);
    }

    const data = await response.json();
    const raw = (data?.candidates?.[0]?.content?.parts?.[0]?.text || '')
      .trim()
      .replace(/^```json\s*/i, '').replace(/^```\s*/i, '').replace(/```\s*$/i, '')
      .trim();

    if (!raw) throw new Error('Empty response from AI');

    scannedItems = JSON.parse(raw);
    if (!Array.isArray(scannedItems) || scannedItems.length === 0) throw new Error('No items found in receipt');

    const list = scannedItems.map(i => `${i.name} — $${parseFloat(i.price).toFixed(2)}`).join('\n');
    status.className = 'scan-status success';
    status.innerHTML = `✅ Found ${scannedItems.length} item${scannedItems.length > 1 ? 's' : ''}:<br><span style="white-space:pre-line;font-size:12px;">${list}</span>`;
    confirmBtn.style.display = '';

  } catch (err) {
    console.error('Scan error:', err);
    status.className = 'scan-status error';
    status.textContent = `❌ ${err.message || 'Could not read receipt'}. Please try again or add items manually.`;
  }
}

    if (!response.ok) {
      const errBody = await response.json().catch(() => ({}));
      throw new Error(errBody?.error?.message || `HTTP ${response.status}`);
    }

    const data = await response.json();
    if (data.error) throw new Error(data.error.message);

    const raw = data.content.map(b => b.text || '').join('').trim()
      .replace(/^```json\s*/i, '').replace(/^```\s*/i, '').replace(/```\s*$/i, '').trim();

    scannedItems = JSON.parse(raw);
    if (!Array.isArray(scannedItems) || scannedItems.length === 0) throw new Error('No items found in receipt');

    const list = scannedItems.map(i => `${i.name} — $${parseFloat(i.price).toFixed(2)}`).join('\n');
    status.className = 'scan-status success';
    status.innerHTML = `✅ Found ${scannedItems.length} item${scannedItems.length > 1 ? 's' : ''}:<br><span style="white-space:pre-line;font-size:12px;">${list}</span>`;
    confirmBtn.style.display = '';

  } catch (err) {
    console.error('Scan error:', err);
    status.className = 'scan-status error';
    status.textContent = `❌ ${err.message || 'Could not read receipt'}. Please try again or add items manually.`;
  }
}

function confirmScan() {
  scannedItems.forEach(si => {
    const id = ++itemId;
    const personQty = {};
    people.forEach(p => { personQty[p] = 0; });
    items.push({
      id,
      name: si.name || '',
      price: parseFloat(si.price) || '',
      personQty,
      persons: [...people],
      taxable: true,
      splitMode: 'all'
    });
  });
  renderItems();
  saveDraft();
  closeScanModal();
}
